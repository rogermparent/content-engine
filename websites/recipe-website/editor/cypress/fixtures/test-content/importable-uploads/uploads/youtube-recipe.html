<!DOCTYPE html>
<html>
<head>
  <title>YouTube Recipe Example</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org/",
    "@type": "Recipe",
    "name": "YouTube Recipe Example",
    "description": "A recipe with a YouTube video",
    "video": {
      "@type": "VideoObject",
      "name": "Recipe Video",
      "contentUrl": "https://www.youtube.com/watch?v=jNQXAC9IVRw"
    },
    "recipeIngredient": ["1 cup flour", "2 eggs", "1 cup milk"],
    "recipeInstructions": [
      {
        "text": "Mix ingredients together"
      },
      {
        "text": "Pour into pan and bake"
      }
    ]
  }
  </script>
</head>
<body>
  <h1>YouTube Recipe Example</h1>
  <p>A delicious recipe with a YouTube video tutorial.</p>
</body>
</html>
